<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات العملاء</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/stye.css">
    <link rel="stylesheet" href="static/all.css">
</head>
<body>
<div class="container mt-5 pt-5">
    <h2 class="text-center mb-4">جميع طلبات العملاء</h2>
    <p class="text-center text-muted small">
        نسخة عرض تجريبية — تعرض هذه الصفحة الطلبات المحفوظة محلياً في متصفحك فقط (<code>localStorage</code>)،
        وليست متصلة بقاعدة بيانات حقيقية.
    </p>
    <div id="emptyState" class="alert alert-secondary text-center" style="display:none;">
        لا توجد طلبات بعد. جرّب <a href="order.html">إرسال طلب</a> أولاً.
    </div>
    <table class="table table-bordered text-center" id="ordersTable" style="display:none;">
        <thead class="table-light">
            <tr>
                <th>الاسم</th>
                <th>العنوان</th>
                <th>المنتج</th>
                <th>الكمية</th>
                <th>الإضافات</th>
                <th>التوصيل</th>
                <th>الإجمالي</th>
            </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
    </table>
</div>
<script>
    const orders = JSON.parse(localStorage.getItem('sugarBlissOrders') || '[]');
    const body = document.getElementById('ordersBody');
    const table = document.getElementById('ordersTable');
    const emptyState = document.getElementById('emptyState');

    if (orders.length === 0) {
        emptyState.style.display = 'block';
    } else {
        table.style.display = 'table';
        orders.forEach(order => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${order.name}</td>
                <td>${order.address || ''}</td>
                <td>${order.product}</td>
                <td>${order.quantity}</td>
                <td>${(order.extras || []).join(', ')}</td>
                <td>${order.deliveryType}</td>
                <td>${order.total}</td>
            `;
            body.appendChild(tr);
        });
    }
</script>
</body>
</html>
