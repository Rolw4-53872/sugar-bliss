<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sugar Bliss-تأكيد الطلب</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/stye.css">
    <link rel="stylesheet" href="static/all.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #ffffff;
            font-family: "Tajawal", sans-serif;
        }

        .main-card {
            max-width: 420px;
            width: 90%;
            border-radius: 12px;
            border: 1px solid #dcdcdc;
        }

        .success-check {
            font-size: 4rem;
            color: #3aa64c;
        }

        .pink-title {
            color: #d3648f;
            font-weight: 600;
        }

        .pink-total {
            color: #d3648f;
            font-weight: 600;
        }

        .gray-text {
            color: #d3648f;
        }

        .btn-pink {
            background-color: #d3648f;
            border-color: #d3648f;
            color: white;
            font-size: 1rem;
            padding: 8px 30px;
            border-radius: 6px;
        }

        .btn-pink:hover {
            background-color: #b65579;
            border-color: #b65579;
        }
    </style>
</head>

<body>

    <section class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">

        <div class="card main-card p-4 shadow-sm">

            <div class="text-end">
                <span class="text-muted small">✖ تم تأكيد طلبك</span>
            </div>

            <div class="text-center mt-3">
                <i class="fas fa-check-circle success-check"></i>
            </div>

            <h3 class="text-center pink-title mt-3" id="customerNameTitle">شكراً!</h3>

            <p class="text-center gray-text">تم استلام طلبك بنجاح (نسخة عرض تجريبية محلية في متصفحك).</p>

            <div class="mt-4">

                <h6 class="fw-bold">تفاصيل الطلب:</h6>

                <p class="mb-1 small" id="productLine"></p>
                <p class="mb-1 small" id="sweetnessLine"></p>
                <p class="mb-3 small" id="extrasLine"></p>

                <div class="d-flex justify-content-between border-top pt-2 small">
                    <span>إجمالي الأصناف:</span>
                    <span id="itemsTotal">0 ريال</span>
                </div>

                <div class="d-flex justify-content-between border-top pt-2">
                    <span>المجموع الكلي:</span>
                    <span class="pink-total" id="finalTotal">0 ريال</span>
                </div>

                <div class="mt-4 border-top pt-2">
                    <h6 class="fw-bold">تفاصيل الاستلام/التوصيل:</h6>
                    <div id="deliveryInfo"></div>
                </div>

            </div>

            <div class="text-center mt-3">
                <a href="order.html" class="btn btn-pink">طلب جديد</a>
                <a href="orders.html" class="btn btn-outline-secondary mt-2">عرض كل الطلبات</a>
            </div>

        </div>

    </section>

    <script>
        const params = new URLSearchParams(window.location.search);

        const name = params.get('name') || 'عميلنا العزيز';
        const product = params.get('product') || '';
        const quantity = parseInt(params.get('quantity') || '1', 10);
        const price = parseFloat(params.get('price') || '0');
        const sweetness = params.get('sweetness') || '3';
        const extras = (params.get('extras') || '').split(',').filter(Boolean);
        const deliveryType = params.get('deliveryType');
        const address = params.get('address') || '';
        const pickupDate = params.get('pickupDate') || '';
        const pickupTime = params.get('pickupTime') || '';
        const finalTotal = parseFloat(params.get('finalTotal') || '0');

        document.getElementById('customerNameTitle').textContent = 'شكراً ' + name + '!';
        document.getElementById('productLine').textContent = `المنتج: ${product} × ${quantity} — ${price} ريال`;
        document.getElementById('sweetnessLine').textContent = `مستوى الحلاوة: ${sweetness}/5`;
        document.getElementById('extrasLine').textContent = 'الإضافات: ' + (extras.length ? extras.join(', ') : 'لا توجد');
        document.getElementById('itemsTotal').textContent = (price * quantity).toFixed(2) + ' ريال';
        document.getElementById('finalTotal').textContent = finalTotal.toFixed(2) + ' ريال';

        const deliveryInfoEl = document.getElementById('deliveryInfo');
        if (deliveryType === 'delivery') {
            deliveryInfoEl.innerHTML = `<p class="small mb-1">سيتم التوصيل إلى: ${address}</p>`;
        } else if (deliveryType === 'pickup') {
            deliveryInfoEl.innerHTML = `
                <p class="small mb-1 gray-text">طريقة الاستلام: الاستلام من المتجر</p>
                <p class="small mb-1">التاريخ والوقت: ${pickupDate} الساعة ${pickupTime}</p>`;
        }
    </script>

</body>
</html>
